server {
    listen 80;
    server_name _;

    # Intranet (página principal)
    location / {
        proxy_pass http://app:8080/intranet.html;
    }

    # TV display
    location /tv {
        proxy_pass http://app:8080/tv.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static files (CSS, JS, images)
    location /static/ {
        proxy_pass http://app:8080/static/;
    }
}
